<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SITTA Universitas Terbuka</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="dashboard-page">
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <img src="assets/logo-ut.png" alt="Logo UT" class="logo">
                <span>SITTA UT</span>
            </div>
            <div class="navbar-user">
                <div class="user-info">
                    <span id="userName"></span>
                    <small id="userRole"></small>
                </div>
                <div class="user-avatar" id="userAvatar"></div>
                <a href="index.html" class="btn-logout-icon" title="Logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </a>
            </div>
        </div>
    </nav>

    <main class="container main-content">
        <section class="greeting-section">
            <div class="greeting-content">
                <span class="greeting-emoji" id="greetingIcon"></span>
                <div>
                    <h1 id="greetingText"></h1>
                    <p id="greetingSubtext"></p>
                </div>
            </div>
        </section>

        <section class="menu-grid">
            <a href="#" class="menu-card" onclick="showPage('stok')">
                <div class="menu-icon icon-blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                </div>
                <h3>Informasi Bahan Ajar</h3>
                <p>Cek stok dan detail bahan ajar</p>
            </a>


            <a href="#" class="menu-card" onclick="showPage('tracking')">
                <div class="menu-icon icon-green">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="1" y="3" width="15" height="13" rx="2"/>
                        <polygon points="16 8 20 5.5 20 12.5 16 10 16 8"/>
                        <circle cx="5.5" cy="18.5" r="2.5"/>
                        <circle cx="18.5" cy="18.5" r="2.5"/>
                    </svg>
                </div>
                <h3>Tracking Pengiriman</h3>
                <p>Pantau status pengiriman DO</p>
            </a>


            <div class="menu-card dropdown">
                <div class="menu-icon icon-yellow">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                    </svg>
                </div>
                <h3>Laporan</h3>
                <p>Monitoring & Rekap Bahan Ajar</p>
                <div class="dropdown-content">
                    <a href="#" onclick="showPage('monitoring')">Monitoring Progress DO</a>
                    <a href="#" onclick="showPage('rekap')">Rekap Bahan Ajar</a>
                </div>
            </div>

            <a href="#" class="menu-card" onclick="showPage('histori')">
                <div class="menu-icon icon-red">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                </div>
                <h3>Histori Transaksi</h3>
                <p>Riwayat transaksi bahan ajar</p>
            </a>
        </section>

        <section id="dynamic-content" class="dynamic-section" style="display: none;">
            <div class="section-header">
                <h2 id="pageTitle">Halaman</h2>
                <button class="btn-close" onclick="closePage()">Tutup</button>
            </div>
            <div id="pageContent" class="page-body">
            </div>
        </section>
    </main>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
